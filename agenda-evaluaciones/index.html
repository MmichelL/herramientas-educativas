  async function importarEvaluaciones(publicar) {
    const cfg = App.Core.config;
    const estado = publicar ? "publicada" : "evaluada";
    const now = new Date().toISOString();
    const ventanaDefault = cfg.ventanas[0]?.id;
    const slotsDefault = ["09:50","10:00","10:10","10:20","10:30","10:40","10:50","11:00","11:10","11:20","11:30"];
    let slotIdx = 0;
    let creados = 0, actualizados = 0;

    await App.Core.mutate(reservas => {
      for (const ev of SEED_EVALUACIONES) {
        const evaluacion = {
          rondas: ev.rondas.map((r, i) => ({
            n: i + 1, competenciaId: r.competenciaId, preguntaId: r.preguntaId,
            puntosLive: r.puntosFinal, puntosFinal: r.puntosFinal,
            transcripcion: r.transcripcion, observacion: r.observacion,
          })),
          checksGlobales: ev.checksGlobales,
          observacionGlobal: ev.observacionGlobal,
          videosURLs: [],
          puntosTotales: ev.puntosTotales,
          ...(publicar ? { publicadaEn: now } : {}),
        };

        // Buscar reserva existente por matrícula + tipo
        const existente = Object.values(reservas).find(
          r => r.estudianteMatricula === ev.matricula && r.tipoActividadId === "eval-recuperacion"
        );

        if (existente) {
          reservas[existente.id] = { ...existente, estado, evaluacion };
          actualizados++;
        } else {
          const id = `r-seed-${ev.matricula}`;
          const slot = slotsDefault[slotIdx++] || "10:00";
          reservas[id] = {
            id, estudianteMatricula: ev.matricula, tipoActividadId: "eval-recuperacion",
            ventanaId: ventanaDefault, slotInicio: slot, estado,
            creadaEn: now, evaluacion,
          };
          creados++;
        }
      }
      return reservas;
    });

    App.UI.toast(`✓ ${creados} creadas, ${actualizados} actualizadas (${estado})`, "success");
    renderTabla();
  }

  function scoreClass(total, max) {
    if (total == null) return "score-none";
    const pct = total / max;
    if (pct >= 0.8) return "score-high";
    if (pct >= 0.53) return "score-mid";
    return "score-low";
  }

  async function renderTabla() {
    await App.Core.fetchState();
    const cfg = App.Core.config;
    const totalMax = cfg.rubrica.rondasPorEstudiante * cfg.rubrica.puntosPorRonda;
    const reservasPorMatricula = {};
    for (const r of Object.values(App.Core.state.reservas)) {
      reservasPorMatricula[r.estudianteMatricula] = r;
    }

    const conNota = Object.values(reservasPorMatricula)
      .filter(r => r.evaluacion && r.evaluacion.puntosTotales != null).length;
    const publicadas = Object.values(reservasPorMatricula)
      .filter(r => r.estado === "publicada").length;
    const confirmadas = Object.values(reservasPorMatricula)
      .filter(r => r.evaluacion && r.evaluacion.confirmadaPorEstudiante).length;

    const filas = cfg.estudiantes.map(est => {
      const r = reservasPorMatricula[est.matricula];
      if (!r) return { est, r: null, total: null, rondas: [], estado: "sin-reserva", confirmado: false };
      const ev = r.evaluacion || {};
      const rondas = ev.rondas || [];
      return { est, r, total: ev.puntosTotales ?? null, rondas, estado: r.estado, confirmado: !!ev.confirmadaPorEstudiante };
    }).sort((a, b) => {
      // publicadas primero, luego evaluadas, luego resto; dentro de cada grupo por nota desc
      const orden = { publicada: 0, evaluada: 1, completada: 2, "en-sesion": 3, reservada: 4, "sin-reserva": 5 };
      const oa = orden[a.estado] ?? 6, ob = orden[b.estado] ?? 6;
      if (oa !== ob) return oa - ob;
      return (b.total ?? -1) - (a.total ?? -1);
    });

    document.getElementById("app").innerHTML = `
      <div class="grades-shell">
        <button class="logout-btn" id="gr-logout">Salir</button>
        <h1>Calificaciones</h1>
        <p style="color:#CBD5E1;font-size:13px;margin-bottom:16px">
          ${App.UI.esc(cfg.asignatura.nombre)} · ${App.UI.esc(cfg.asignatura.periodo)}
        </p>

        <div class="tch-stats" style="margin-bottom:16px">
          <div class="tch-stat"><strong>${filas.length}</strong>estudiantes</div>
          <div class="tch-stat"><strong>${conNota}</strong>calificados</div>
          <div class="tch-stat"><strong>${publicadas}</strong>publicados</div>
          <div class="tch-stat"><strong>${confirmadas}</strong>confirmados</div>
        </div>

        <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
          <button class="btn btn-ghost" id="gr-agenda" style="color:white;border-color:rgba(255,255,255,0.4)">← Agenda</button>
          <button class="btn btn-success" id="gr-publicar-bulk">📢 Publicar todas evaluadas</button>
          <button class="btn btn-primary" id="gr-importar" style="background:#8B5CF6">⬆ Importar Reporte Final</button>
        </div>

        <div class="grades-section">
          <div style="overflow-x:auto">
            <table class="grades-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Estudiante</th>
                  <th>Matrícula</th>
                  ${Array.from({length: cfg.rubrica.rondasPorEstudiante}, (_, i) => `<th>P${i+1}</th>`).join("")}
                  <th>Total</th>
                  <th>Estado</th>
                  <th>Confirmó</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody>
                ${filas.map((f, idx) => renderFilaEstudiante(f, idx + 1, cfg, totalMax)).join("")}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;

    document.getElementById("gr-logout").onclick = () => {
      App.Auth.clearSession(); App.Core.navigate("#/"); location.reload();
    };
    document.getElementById("gr-agenda").onclick = () => App.Core.navigate("#/profe/agenda");
    document.getElementById("gr-publicar-bulk").onclick = () => publicarBulkGrades();
    document.getElementById("gr-importar").onclick = async () => {
      const result = await App.UI.modal({
        title: "Importar Reporte Final SIST-3311",
        body: `<p>Carga las evaluaciones del Reporte Final ENE-ABR 2026 (11 estudiantes) directo en KV.</p>
               <p style="margin-top:8px"><strong>Si ya existen reservas para esos estudiantes, se sobreescribirán.</strong></p>
               <p style="margin-top:8px">¿Con qué estado deseas cargarlas?</p>`,
        actions: [
          { label: "Cancelar",          class: "btn-ghost",    value: null },
          { label: "Cargar (evaluada)", class: "btn-primary",  value: "evaluada" },
          { label: "Cargar y publicar", class: "btn-success",  value: "publicada" },
        ],
      });
      if (!result) return;
      await importarEvaluaciones(result === "publicada");
    };

    document.querySelectorAll(".gr-ver").forEach(b => {
      b.onclick = () => App.Core.navigate(`#/profe/calificacion/${b.dataset.id}`);
    });
    document.querySelectorAll(".gr-publish").forEach(b => {
      b.onclick = () => togglePublicar(b.dataset.id, b.dataset.estado);
    });
  }

  function renderFilaEstudiante(f, num, cfg, totalMax) {
    const { est, r, total, rondas, estado, confirmado } = f;
    const notaClass = scoreClass(total, totalMax);
    const puedeVer = r && r.evaluacion && (estado === "evaluada" || estado === "publicada" || estado === "completada");
    const puedePublicar = r && (estado === "evaluada" || estado === "publicada");

    const notasCeldas = Array.from({length: cfg.rubrica.rondasPorEstudiante}, (_, i) => {
      const ro = rondas[i];
      const n = ro ? (ro.puntosFinal ?? ro.puntosLive ?? null) : null;
      return `<td style="font-weight:700;color:${n != null ? "var(--navy)" : "var(--dgray)"}">${n != null ? n.toFixed(1) : "—"}</td>`;
    }).join("");

    return `
      <tr>
        <td style="color:var(--dgray)">${num}</td>
        <td style="font-weight:600">${App.UI.esc(est.nombre)}</td>
        <td style="color:var(--dgray);font-size:12px">${App.UI.esc(est.matricula)}</td>
        ${notasCeldas}
        <td class="score-cell ${notaClass}">${total != null ? total.toFixed(1) : "—"}</td>
        <td>${r ? `<span class="badge badge-${App.UI.esc(estado)}">${App.UI.esc(estado)}</span>` : `<span style="color:var(--dgray);font-size:12px">sin reserva</span>`}</td>
        <td style="text-align:center;font-size:16px">${confirmado ? "✓" : ""}</td>
        <td style="white-space:nowrap">
          ${puedeVer ? `<button class="btn btn-ghost tch-action-btn gr-ver" data-id="${r.id}">Ver</button> ` : ""}
          ${puedePublicar ? `<button class="btn tch-action-btn gr-publish ${estado === "publicada" ? "btn-danger" : "btn-success"}" data-id="${r.id}" data-estado="${estado}">${estado === "publicada" ? "🔒 Despublicar" : "📢 Publicar"}</button>` : ""}
        </td>
      </tr>
    `;
  }

  async function togglePublicar(reservaId, estadoActual) {
    const nuevoEstado = estadoActual === "publicada" ? "evaluada" : "publicada";
    try {
      await App.Core.mutate(reservas => {
        const r = reservas[reservaId];
        if (!r) return reservas;
        r.estado = nuevoEstado;
        r.evaluacion = {
          ...(r.evaluacion || {}),
          publicadaEn: nuevoEstado === "publicada" ? new Date().toISOString() : null,
        };
        return reservas;
      });
      App.UI.toast(nuevoEstado === "publicada" ? "Publicado" : "Despublicado", "success");
      renderTabla();
    } catch (e) {
      App.UI.toast(e.message || "Error", "error");
    }
  }

  async function publicarBulkGrades() {
    const ok = await App.UI.confirm("Publicar TODAS las reservas en estado 'evaluada'?");
    if (!ok) return;
    try {
      await App.Core.mutate(reservas => {
        const when = new Date().toISOString();
        for (const r of Object.values(reservas)) {
          if (r.estado === "evaluada") {
            r.estado = "publicada";
            r.evaluacion = { ...(r.evaluacion || {}), publicadaEn: when };
          }
        }
        return reservas;
      });
      App.UI.toast("Publicación masiva completada", "success");
      renderTabla();
    } catch (e) {
      App.UI.toast(e.message || "Error", "error");
    }
  }

  async function renderDetalle(reservaId) {
    await App.Core.fetchState();
    const cfg = App.Core.config;
    const reserva = App.Core.state.reservas[reservaId];
    if (!reserva || !reserva.evaluacion) {
      App.UI.toast("Reserva sin evaluación", "error");
      App.Core.navigate("#/profe/calificaciones");
      return;
    }

    const est = cfg.estudiantes.find(e => e.matricula === reserva.estudianteMatricula);
    const tipo = cfg.tiposActividad.find(t => t.id === reserva.tipoActividadId);
    const ventana = cfg.ventanas.find(v => v.id === reserva.ventanaId);
    const ev = reserva.evaluacion;
    const rondas = ev.rondas || [];
    const checks = ev.checksGlobales || {};
    const checksDefs = cfg.rubrica.checksGlobales;
    const totalMax = cfg.rubrica.rondasPorEstudiante * cfg.rubrica.puntosPorRonda;
    const confirmado = ev.confirmadaPorEstudiante;
    const confirmadaEn = ev.confirmadaEn ? new Date(ev.confirmadaEn).toLocaleString("es-DO") : null;

    document.getElementById("app").innerHTML = `
      <div class="grades-shell">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:16px">
          <div>
            <button class="btn btn-ghost" id="gr-det-back" style="color:white;border-color:rgba(255,255,255,0.4);margin-bottom:8px">← Calificaciones</button>
            <h1>${App.UI.esc(est ? est.nombre : reserva.estudianteMatricula)}</h1>
            <p style="color:#CBD5E1;font-size:13px">${App.UI.esc(est ? est.matricula : "")} · ${App.UI.esc(tipo ? tipo.etiqueta : "")} · ${App.UI.esc(ventana ? ventana.fecha : "")} ${App.UI.esc(reserva.slotInicio || "")}</p>
          </div>
          <div style="text-align:right">
            <div style="font-size:40px;font-weight:800;color:white">${ev.puntosTotales != null ? ev.puntosTotales.toFixed(1) : "—"}</div>
            <div style="color:#CBD5E1;font-size:13px">de ${totalMax} pts</div>
            <span class="badge badge-${App.UI.esc(reserva.estado)}" style="margin-top:4px">${App.UI.esc(reserva.estado)}</span>
          </div>
        </div>

        <div class="grades-section">
          ${rondas.map((r, i) => renderRondaDetalleProfe(r, i, cfg)).join("")}

          <div class="detail-global" style="margin-bottom:8px">
            <strong>Cumplimiento:</strong><br>
            ${checksDefs.map(c => `<span style="margin-right:14px">${checks[c.id] ? "✓" : "✗"} ${App.UI.esc(c.etiqueta)}</span>`).join("")}
          </div>

          ${ev.observacionGlobal ? `
            <div class="detail-global" style="margin-bottom:8px">
              <strong>Observación general:</strong><br>${App.UI.esc(ev.observacionGlobal)}
            </div>` : ""}

          ${(ev.videosURLs || []).length ? `
            <div class="detail-global" style="margin-bottom:8px">
              <strong>Videos:</strong><br>
              ${ev.videosURLs.map(u => {
                const safe = /^https?:\/\//i.test(u);
                return safe ? `<a href="${App.UI.esc(u)}" target="_blank" rel="noopener">${App.UI.esc(u)}</a>` : App.UI.esc(u);
              }).join("<br>")}
            </div>` : ""}

          <div class="confirm-strip ${confirmado ? "confirmed" : "pending"}">
            ${confirmado
              ? `<span>✓ Calificación confirmada por el estudiante el ${App.UI.esc(confirmadaEn)}</span>`
              : `<span>⏳ Pendiente de confirmación por el estudiante</span>`}
          </div>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap">
          ${reserva.estado === "evaluada"
            ? `<button class="btn btn-success" id="gr-det-publish">📢 Publicar resultado</button>`
            : reserva.estado === "publicada"
            ? `<button class="btn btn-danger" id="gr-det-unpublish">🔒 Despublicar</button>`
            : ""}
          <button class="btn btn-ghost" id="gr-det-procesar" style="color:white;border-color:rgba(255,255,255,0.4)">Ir a procesar</button>
        </div>
      </div>
    `;

    document.getElementById("gr-det-back").onclick = () => App.Core.navigate("#/profe/calificaciones");
    document.getElementById("gr-det-procesar").onclick = () => App.Core.navigate(`#/profe/proceso/${reservaId}`);

    const pubBtn = document.getElementById("gr-det-publish");
    if (pubBtn) pubBtn.onclick = async () => {
      await togglePublicar(reservaId, "evaluada");
      renderDetalle(reservaId);
    };
    const unpubBtn = document.getElementById("gr-det-unpublish");
    if (unpubBtn) unpubBtn.onclick = async () => {
      await togglePublicar(reservaId, "publicada");
      renderDetalle(reservaId);
    };
  }

  function renderRondaDetalleProfe(r, i, cfg) {
    const comp = cfg.competencias.find(c => c.id === r.competenciaId);
    const preg = comp ? comp.preguntas.find(p => p.id === r.preguntaId) : null;
    const nota = r.puntosFinal ?? r.puntosLive ?? "—";
    return `
      <div class="grade-detail-ronda">
        <span class="grade-detail-nota">${nota} / ${cfg.rubrica.puntosPorRonda}</span>
        <h3>Ronda ${i + 1} · ${App.UI.esc(comp ? comp.nombre : r.competenciaId)}</h3>
        <p style="font-size:13px;color:var(--dgray);margin:4px 0">
          <strong>Escenario:</strong> ${App.UI.esc(preg ? preg.escenario : "")}
        </p>
        <p style="font-size:13px;color:var(--navy);margin-bottom:8px">
          <strong>Pregunta:</strong> ${App.UI.esc(preg ? preg.preguntaGuia : "")}
        </p>
        ${preg && preg.queBuscar ? `
          <div class="detail-quebuscar" style="margin-bottom:8px">
            <strong>Qué buscar:</strong> ${App.UI.esc(preg.queBuscar)}
          </div>` : ""}
        ${r.transcripcion ? `
          <p style="font-size:11px;font-weight:700;color:var(--dgray);text-transform:uppercase;letter-spacing:0.5px;margin:10px 0 4px">Transcripción del estudiante:</p>
          <div class="detail-transcripcion">${App.UI.esc(r.transcripcion)}</div>
        ` : ""}
        ${r.observacion ? `
          <p style="font-size:11px;font-weight:700;color:var(--dgray);text-transform:uppercase;letter-spacing:0.5px;margin:10px 0 4px">Retroalimentación:</p>
          <div class="detail-global">${App.UI.esc(r.observacion)}</div>
        ` : ""}
      </div>
    `;
  }

  return { renderTabla, renderDetalle };
})();

// ══════════════════════════════════════════════════════════════════
// Boot
// ══════════════════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", async () => {
  const session = App.Auth.loadSession();
  if (session && CONFIGURACIONES.some(c => c.id === session.configId)) {
    try {
      App.Core.setConfig(session.configId);
      await App.Core.fetchState();
      const defaultHash = session.rol === "profe" ? "#/profe/agenda" : "#/estudiante/agenda";
      if (!window.location.hash || window.location.hash === "#/") {
        App.Core.navigate(defaultHash);
      }
    } catch (e) {
      App.Auth.clearSession();
      App.Auth.render();
      return;
    }
  }
  App.Core.onRoute(route);
  route(window.location.hash || "#/");
});

function route(hash) {
  const session = App.Auth.loadSession();
  if (!session) {
    App.Auth.render();
    return;
  }
  if (hash === "#/" || !hash) {
    App.Core.navigate(session.rol === "profe" ? "#/profe/agenda" : "#/estudiante/agenda");
    return;
  }
  if (session.rol === "estudiante") {
    if (hash === "#/estudiante/agenda") return App.Student.renderHome();
    const vm = hash.match(/^#\/estudiante\/reservar\/([^/]+)\/([^/]+)$/);
    if (vm) return App.Student.renderReservar(decodeURIComponent(vm[1]), decodeURIComponent(vm[2]));
    const rm = hash.match(/^#\/estudiante\/resultado\/([^/]+)$/);
    if (rm) return App.Student.renderResultado(decodeURIComponent(rm[1]));
  }
  if (session.rol === "profe") {
    if (hash === "#/profe/agenda") return App.Teacher.renderAgenda();
    if (hash === "#/profe/calificaciones") return App.Grades.renderTabla();
    const gm = hash.match(/^#\/profe\/calificacion\/([^/]+)$/);
    if (gm) return App.Grades.renderDetalle(decodeURIComponent(gm[1]));
    const em = hash.match(/^#\/profe\/eval\/([^/]+)$/);
    if (em) return App.Eval.renderLive(decodeURIComponent(em[1]));
    const pm = hash.match(/^#\/profe\/proceso\/([^/]+)$/);
    if (pm) return App.Eval.renderProceso(decodeURIComponent(pm[1]));
    if (hash === "#/profe/reportes") return App.Reports.renderPanel();
  }
  document.getElementById("app").innerHTML =
    `<div style="padding:40px;color:white">Ruta pendiente: ${App.UI.esc(hash)}</div>`;
}
</script>

</html>
